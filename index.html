<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>SosoFab Lifestyle | Luxury Fashion</title>
    <meta name="description" content="Curated luxury fashion for the modern woman. Elegance redefined." />
    <meta name="author" content="SosoFab Lifestyle" />
    <link rel="icon" href="/logo.png" type="image/png" />

    <meta property="og:title" content="SosoFab Lifestyle | Luxury Fashion" />
    <meta property="og:description" content="Curated luxury fashion for the modern woman. Elegance redefined." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SosoFabLifestyle" />
    <meta name="twitter:image" content="/logo.png" />
  </head>

  <body>
    <div id="root"></div>
    <!-- SPA redirect handler for 404.html fallback -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
